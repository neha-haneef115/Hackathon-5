apiVersion: v1
kind: ConfigMap
metadata:
  name: fte-config
  namespace: customer-success-fte
  labels:
    app: customer-success-fte
    component: config
data:
  # Environment Configuration
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  DEBUG: "false"
  
  # Database Configuration
  POSTGRES_HOST: "postgres.customer-success-fte.svc.cluster.local"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "fte_db"
  POSTGRES_USER: "fte_user"
  
  # Kafka Configuration
  KAFKA_BOOTSTRAP_SERVERS: "kafka.kafka.svc.cluster.local:9092"
  KAFKA_GROUP_ID_PREFIX: "fte-prod"
  
  # Redis Configuration
  REDIS_HOST: "redis.customer-success-fte.svc.cluster.local"
  REDIS_PORT: "6379"
  
  # Channel Configuration
  GMAIL_ENABLED: "true"
  WHATSAPP_ENABLED: "true"
  WEBFORM_ENABLED: "true"
  
  # Message Length Limits
  MAX_EMAIL_LENGTH: "2000"
  MAX_WHATSAPP_LENGTH: "1600"
  MAX_WEBFORM_LENGTH: "1000"
  
  # Performance Configuration
  WORKER_CONCURRENCY: "10"
  MAX_CONNECTIONS: "100"
  CONNECTION_TIMEOUT: "30"
  
  # Monitoring Configuration
  METRICS_ENABLED: "true"
  HEALTH_CHECK_INTERVAL: "30"
  
  # API Configuration
  API_RATE_LIMIT: "100"
  API_TIMEOUT: "30"
  
  # Agent Configuration
  AGENT_MODEL: "gemini-2.0-flash"
  AGENT_MAX_TOKENS: "4000"
  AGENT_TEMPERATURE: "0.1"
  
  # Escalation Configuration
  ESCALATION_AUTO_ENABLED: "true"
  ESCALATION_RETRY_ATTEMPTS: "3"
  
  # Security Configuration
  CORS_ORIGINS: "https://support.yourdomain.com,https://www.yourdomain.com"
  SESSION_TIMEOUT: "3600"
  
  # Feature Flags
  ENABLE_METRICS_COLLECTOR: "true"
  ENABLE_DAILY_REPORTS: "true"
  ENABLE_REAL_TIME_UPDATES: "true"
