apiVersion: v1
kind: Service
metadata:
  name: customer-success-fte
  namespace: customer-success-fte
  labels:
    app: customer-success-fte
    component: api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  - name: https
    port: 443
    targetPort: 8000
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 8000
    protocol: TCP
  selector:
    app: customer-success-fte
    component: api
---
# Headless Service for StatefulSet (if needed for direct pod communication)
apiVersion: v1
kind: Service
metadata:
  name: fte-worker-headless
  namespace: customer-success-fte
  labels:
    app: customer-success-fte
    component: worker
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: metrics
    port: 8080
    targetPort: 8080
    protocol: TCP
  selector:
    app: customer-success-fte
    component: worker
---
# Service for Metrics Collector
apiVersion: v1
kind: Service
metadata:
  name: fte-metrics-collector
  namespace: customer-success-fte
  labels:
    app: customer-success-fte
    component: metrics-collector
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9091"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - name: metrics
    port: 9091
    targetPort: 8080
    protocol: TCP
  selector:
    app: customer-success-fte
    component: metrics-collector
