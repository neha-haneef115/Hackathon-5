apiVersion: v1
kind: Secret
metadata:
  name: fte-secrets
  namespace: customer-success-fte
  labels:
    app: customer-success-fte
    component: secrets
type: Opaque
stringData:
  # Google AI Configuration
  GEMINI_API_KEY: "your-gemini-api-key-here"
  
  # Database Configuration
  POSTGRES_PASSWORD: "your-secure-postgres-password-here"
  
  # Gmail Configuration
  GMAIL_ADDRESS: "support@yourdomain.com"
  GMAIL_APP_PASSWORD: "your-gmail-app-password-here"
  
  # Meta WhatsApp Configuration
  WHATSAPP_TOKEN: "your-whatsapp-access-token-here"
  WHATSAPP_PHONE_NUMBER_ID: "your-whatsapp-phone-number-id-here"
  WHATSAPP_VERIFY_TOKEN: "your-whatsapp-verify-token-here"
  
  # JWT Secret (if using JWT authentication)
  JWT_SECRET_KEY: "your-jwt-secret-key-here"
  
  # External API Keys (if needed)
  SLACK_BOT_TOKEN: "your-slack-bot-token-here"
  ZAPIER_API_KEY: "your-zapier-api-key-here"
  
  # Monitoring Configuration
  GRAFANA_ADMIN_PASSWORD: "your-grafana-password-here"
  PROMETHEUS_ADMIN_PASSWORD: "your-prometheus-password-here"
  
  # SSL Certificates (if using self-signed)
  SSL_CERT_PATH: "/etc/ssl/certs/server.crt"
  SSL_KEY_PATH: "/etc/ssl/private/server.key"
  
  # Encryption Keys
  ENCRYPTION_KEY: "your-encryption-key-for-sensitive-data"
  
  # Third-party Integrations
  SENTRY_DSN: "your-sentry-dsn-here"
  DATADOG_API_KEY: "your-datadog-api-key-here"
  
  # Backup Configuration
  BACKUP_ENCRYPTION_KEY: "your-backup-encryption-key-here"
  
  # Email SMTP Configuration (alternative to Gmail)
  SMTP_HOST: "smtp.yourdomain.com"
  SMTP_PORT: "587"
  SMTP_USERNAME: "noreply@yourdomain.com"
  SMTP_PASSWORD: "your-smtp-password-here"
  
  # OAuth Configuration
  GOOGLE_CLIENT_ID: "your-google-client-id-here"
  GOOGLE_CLIENT_SECRET: "your-google-client-secret-here"
  
  # Webhook Secrets
  WEBHOOK_SECRET: "your-webhook-signing-secret-here"
  
  # Database SSL Configuration
  DB_SSL_CERT: "path-to-ssl-cert"
  DB_SSL_KEY: "path-to-ssl-key"
  DB_SSL_CA: "path-to-ssl-ca"
